<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="blog-post-card">
    <img src="./illustration-article.svg" alt="Blog Post Image" class="blog-post-image">

    <div class="blog-post-content">
        <a class="learning-button">Learning</a>
        <p class="publish-date">Published 21 Dec 2023</p>
        <h2 class="blog-post-title">HTML & CSS Foundations</h2>
        <p class="blog-post-description">These languages are the backbone of every website, defining structure, content and presentation.</p>
    </div>
    <div class="blog-post-founder">
        <img src="./image-avatar.webp" alt="Author Avatar" class="author-avatar">
        <p class="author-name">Gregg Hooper</p>
    </div>
</div>
</body>
</html>
